name: Chromatic Visual Regression

on:
  pull_request:
    paths:
      - 'src/app/react-core-package/**'
      - 'src/app/tokens-package/**'
      - 'src/app/styles-package/**'
  push:
    branches: [main, codex/design-system-hardening]
    paths:
      - 'src/app/react-core-package/**'
      - 'src/app/tokens-package/**'
      - 'src/app/styles-package/**'

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Chromatic to detect changes

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          npm_config_legacy_peer_deps: true

      - name: Build Storybook
        run: pnpm --dir src/app/react-core-package exec storybook build --output-dir storybook-static --quiet
        env:
          CI: 'true'
          STORYBOOK_DISABLE_TELEMETRY: '1'
          HOME: /tmp/ux4g-storybook-home

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: src/app/react-core-package/storybook-static
          exitZeroOnChanges: true
          exitOnceUploaded: true
          onlyChanged: true
          skip: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
          autoAcceptChanges: main
