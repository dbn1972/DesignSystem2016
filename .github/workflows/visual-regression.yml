name: Visual Regression Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/visual/**'
      - 'playwright.config.ts'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/visual/**'
      - 'playwright.config.ts'

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Playwright Visual Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          npm_config_legacy_peer_deps: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npx playwright test tests/visual/baseline.visual.ts --project=chromium
        env:
          CI: 'true'

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            playwright-report/
            tests/visual/__snapshots__/
          retention-days: 14

      - name: Upload baseline snapshots
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/visual/__snapshots__/
          retention-days: 30
