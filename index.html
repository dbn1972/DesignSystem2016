<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>UX4G — Government of India Design System</title>
    <meta name="description" content="India's open-source design system for building consistent, accessible digital public services. 77 components across React, Angular, and Web Components with WCAG 2.1 AA compliance." />
    <meta name="keywords" content="UX4G, design system, government, India, React, Angular, Web Components, accessibility, WCAG, Aadhaar, digital services" />
    <meta name="author" content="UX4G Design System Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://designsystem.dl6.in/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="UX4G — Government of India Design System" />
    <meta property="og:description" content="77 production-ready components for building accessible government digital services across React, Angular, and Web Components." />
    <meta property="og:url" content="https://designsystem.dl6.in/" />
    <meta property="og:site_name" content="UX4G Design System" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UX4G — Government of India Design System" />
    <meta name="twitter:description" content="77 production-ready components for building accessible government digital services." />

    <!-- Theme -->
    <meta name="theme-color" content="#005196" />
    <meta name="color-scheme" content="light dark" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "UX4G Design System",
      "description": "Government of India Design System — 77 components for building consistent, accessible digital public services",
      "url": "https://designsystem.dl6.in/",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Web",
      "author": {
        "@type": "Organization",
        "name": "Government of India",
        "url": "https://www.india.gov.in/"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      }
    }
    </script>

    <!-- FOUC Prevention: apply stored theme before first paint -->
    <script>(function(){try{var d=document.documentElement,s=localStorage.getItem('ux4g-theme-color-scheme'),m='light';if(s==='dark')m='dark';else if(s!=='light')m=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';d.setAttribute('data-theme',m);d.style.colorScheme=m;if(m==='dark')d.classList.add('dark');else d.classList.remove('dark');if(localStorage.getItem('ux4g-theme-contrast-mode')==='true')d.setAttribute('data-contrast','high');}catch(e){var d=document.documentElement;d.setAttribute('data-theme','light');d.style.colorScheme='light';}})()</script>
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
