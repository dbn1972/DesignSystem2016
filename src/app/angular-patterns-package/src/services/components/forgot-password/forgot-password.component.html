<div class="svc-page">
  <ux4g-service-header icon="🔑" iconColor="#9333ea" category="Government Service Access" title="Reset Your Password"></ux4g-service-header>

  <main class="svc-form-container">
    <div class="ux4g-service-card">
      <div class="ux4g-service-card__header">
        <h2 class="ux4g-service-card__title">Forgot Password</h2>
        <p class="ux4g-service-card__subtitle">Enter your registered email to receive a password reset link.</p>
      </div>

      <div *ngIf="error" class="ux4g-alert ux4g-alert--error" role="alert">
        <span aria-hidden="true">⚠</span> {{ error }}
      </div>
      <div *ngIf="success" class="ux4g-alert ux4g-alert--success" role="status">
        <span aria-hidden="true">✅</span> {{ success }}
      </div>

      <form *ngIf="!success" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="ux4g-field">
          <label class="ux4g-label" for="fp-email">Email Address</label>
          <input id="fp-email" class="ux4g-input" [class.ux4g-input--error]="f['email'].touched && f['email'].invalid" type="email" formControlName="email" placeholder="you&#64;example.com" autocomplete="email" />
          <div class="ux4g-error-text" *ngIf="f['email'].touched && f['email'].invalid" role="alert">
            <span *ngIf="f['email'].errors?.['required']">Email is required</span>
            <span *ngIf="f['email'].errors?.['email']">Enter a valid email</span>
          </div>
        </div>
        <button type="submit" class="ux4g-button ux4g-button--primary ux4g-button--full-width" [disabled]="loading">
          <span *ngIf="loading" class="ux4g-spinner ux4g-spinner--sm" aria-hidden="true"></span>
          {{ loading ? 'Sending…' : 'Send Reset Link' }}
        </button>
      </form>

      <div class="ux4g-service-card__footer">
        <a href="/reference-service/sign-in" class="ux4g-link">← Back to Sign In</a>
      </div>
    </div>
  </main>

  <ux4g-service-footer leftText="Government Service Platform • Government of India" rightText="Forgot Password"></ux4g-service-footer>
</div>
